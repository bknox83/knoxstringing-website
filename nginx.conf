# Public hostname is www only here; apex (knoxstringing.com) and HTTPS are handled at Cloudflare
# (redirects / TLS). This vhost only sees traffic the tunnel forwards to the container.
server {
    listen 80;
    server_name www.knoxstringing.com;

    # Enable gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Security and behavior headers (apply to all responses)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;

    # HTML – don’t cache so new deploys are seen
    location = /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # Static assets – long cache (1 year); safe with ?v= on CSS/JS
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|webp|svg)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        log_not_found off;
        try_files $uri =404;
    }

    # robots and sitemap – 1 day
    location = /robots.txt {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }
    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Everything else (e.g. /) – don’t cache, SPA fallback
    location / {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
