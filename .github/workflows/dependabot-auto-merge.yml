# Enable auto-merge on Dependabot PRs only after CI is successful.
# Requires: Repo Settings → General → Pull Requests → "Allow auto-merge" enabled.
#
# We keep the `pull_request` trigger (because GitHub `workflow_run` wasn't firing
# for the PR case), but we *wait* for required checks to turn `success`
# before calling the auto-merge API.

name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Wait for required CI checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          echo "Waiting for CI checks to succeed on PR #${PR_NUMBER} (${HEAD_SHA})..."

          # Poll up to ~10 minutes (40 * 15s).
          for i in $(seq 1 40); do
            CHECKS_JSON="$(curl -sS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${HEAD_SHA}/check-runs?per_page=100")"

            state="$(python3 - <<'PY' <<< "${CHECKS_JSON}"
import json, sys
data=json.loads(sys.stdin.read())
runs=data.get("check_runs", [])
def concl(name):
    # Case-insensitive lookup by check-run name; pick the most recently completed one.
    matches = []
    for r in runs:
        if (r.get("name") or "").lower() == name.lower():
            matches.append(r)
    if not matches:
        return None
    def sort_key(r):
        return r.get("completed_at") or r.get("started_at") or ""
    matches.sort(key=sort_key, reverse=True)
    return matches[0].get("conclusion")

site=concl("site-checks")
codeql=concl("CodeQL")

if site == "success" and codeql == "success":
    print("SUCCESS")
elif site == "failure" or codeql == "failure":
    print("FAIL")
else:
    print("WAIT")
PY
)"

            if [ "$state" = "SUCCESS" ]; then
              echo "CI checks are successful."
              break
            fi

            if [ "$state" = "FAIL" ]; then
              echo "CI checks failed; not enabling auto-merge."
              exit 1
            fi

            echo "Not ready yet (attempt ${i}/40). Sleeping 15s..."
            sleep 15
          done

      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          echo "Enabling auto-merge (squash) for dependabot PR #${PR_NUMBER}..."
          STATUS_CODE="$(curl -sS -o /tmp/auto-merge-response.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}/auto-merge" \
            -d '{"merge_method":"squash"}')"

          if [ "$STATUS_CODE" -lt 200 ] || [ "$STATUS_CODE" -ge 300 ]; then
            echo "Auto-merge API call failed (HTTP ${STATUS_CODE})."
            echo "Response:"
            cat /tmp/auto-merge-response.json
            exit 1
          fi
