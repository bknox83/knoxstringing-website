# Enable auto-merge on Dependabot PRs after CI succeeds.
# Requires: Repo Settings → General → Pull Requests → "Allow auto-merge" enabled.
#
# Why this exists:
# - `pull_request` triggers can race with required checks/mergeability.
# - This workflow waits for the main CI workflow (`✅ CI`) to finish successfully.

name: Dependabot Auto-Merge

on:
  workflow_run:
    workflows: ["✅ CI"]
    types: [completed]

permissions:
  pull-requests: write
  contents: read

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Enable auto-merge for Dependabot PR(s)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          # workflow_run can be associated with one or more PRs.
          PR_NUMBERS="$(python3 -c "import json; e=json.load(open('$GITHUB_EVENT_PATH')); prs=e.get('pull_requests',[]); print(' '.join(str(pr['number']) for pr in prs))")"
          if [ -z "$PR_NUMBERS" ]; then
            echo "No PRs associated with this CI run; nothing to do."
            exit 0
          fi

          for PR_NUMBER in $PR_NUMBERS; do
            PR_JSON="$(curl -sS -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER")"

            PR_LOGIN="$(python3 -c "import json,sys; j=json.loads(sys.stdin.read()); print(j['user']['login'])" <<< "$PR_JSON")"
            if [ "$PR_LOGIN" != "dependabot[bot]" ]; then
              echo "Skipping PR #$PR_NUMBER: author is '$PR_LOGIN' (not dependabot[bot])."
              continue
            fi

            echo "Enabling auto-merge (squash) for dependabot PR #$PR_NUMBER..."

            DATA="$(python3 -c "import json,os; print(json.dumps({'merge_method':'squash','sha':os.environ['HEAD_SHA']}))")"
            STATUS_CODE="$(curl -sS -o /tmp/auto-merge-response.json -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/auto-merge" \
              -d "$DATA")"

            if [ "$STATUS_CODE" -lt 200 ] || [ "$STATUS_CODE" -ge 300 ]; then
              echo "Auto-merge API call failed for PR #$PR_NUMBER (HTTP $STATUS_CODE)."
              echo "Response:"
              cat /tmp/auto-merge-response.json
              exit 1
            fi
          done
