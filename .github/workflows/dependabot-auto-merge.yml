# Enable auto-merge on Dependabot PRs only after CI is successful.
# Requires: Repo Settings → General → Pull Requests → "Allow auto-merge" enabled.
#
# We keep the `pull_request` trigger (because GitHub `workflow_run` wasn't firing
# for the PR case), but we *wait* for required checks to turn `success`
# before calling the auto-merge API.

name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    # Use the PR author, not the event actor (synchronize events may be triggered by a rebase/force-push).
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Wait for required CI checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          echo "Waiting for CI checks to succeed on PR #${PR_NUMBER} (${HEAD_SHA})..."

          # Poll up to ~10 minutes (40 * 15s).
          for i in $(seq 1 40); do
            CHECKS_JSON="$(curl -sS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${HEAD_SHA}/check-runs?per_page=100")"

            state="$(python3 -c 'import json,sys; d=json.loads(sys.stdin.read()); runs=d.get("check_runs",[]); sm=[r for r in runs if (r.get("name") or "").lower()=="site-checks"]; sm.sort(key=lambda r:(r.get("completed_at") or r.get("started_at") or ""), reverse=True); site=sm[0].get("conclusion") if sm else None; cm=[r for r in runs if (r.get("name") or "").lower()=="codeql"]; cm.sort(key=lambda r:(r.get("completed_at") or r.get("started_at") or ""), reverse=True); codeql=cm[0].get("conclusion") if cm else None; print("SUCCESS" if (site=="success" and codeql=="success") else ("FAIL" if (site=="failure" or codeql=="failure") else "WAIT"))' <<< "${CHECKS_JSON}")"

            if [ "$state" = "SUCCESS" ]; then
              echo "CI checks are successful."
              break
            fi

            if [ "$state" = "FAIL" ]; then
              echo "CI checks failed; not enabling auto-merge."
              exit 1
            fi

            echo "Not ready yet (attempt ${i}/40). Sleeping 15s..."
            sleep 15
          done

      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          echo "Submitting APPROVED review for dependabot PR #${PR_NUMBER}..."
          REVIEW_CODE="$(curl -sS -o /tmp/auto-approve-response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            -d "{\"event\":\"APPROVE\",\"commit_id\":\"${HEAD_SHA}\",\"body\":\"Auto-approve Dependabot after CI success\"}")"

          # If a review already exists, GitHub can return 422; treat that as non-fatal.
          if [ "$REVIEW_CODE" -lt 200 ] || [ "$REVIEW_CODE" -ge 300 ]; then
            if [ "$REVIEW_CODE" != "422" ]; then
              echo "Auto-approve failed (HTTP ${REVIEW_CODE})."
              echo "Response:"
              cat /tmp/auto-approve-response.json
              exit 1
            fi
            echo "Auto-approve returned HTTP 422 (likely already reviewed). Continuing..."
          fi

          echo "Enabling auto-merge (squash) for dependabot PR #${PR_NUMBER}..."
          for attempt in $(seq 1 6); do
            STATUS_CODE="$(curl -sS -o /tmp/auto-merge-response.json -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}/auto-merge" \
              -d '{"merge_method":"squash"}')"

            if [ "$STATUS_CODE" -ge 200 ] && [ "$STATUS_CODE" -lt 300 ]; then
              exit 0
            fi

            echo "Auto-merge attempt ${attempt}/6 failed (HTTP ${STATUS_CODE}). Waiting 10s..."
            sleep 10
          done

          echo "Auto-merge API call failed after retries (HTTP ${STATUS_CODE})."
          echo "Response:"
          cat /tmp/auto-merge-response.json
          exit 1
