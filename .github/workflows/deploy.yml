# Deploy to server only after both CI (site-checks) and CodeQL have succeeded for the same commit.
# Triggered when either workflow completes on main; deploys only when both have passed.
name: deploy-to-server

on:
  workflow_run:
    workflows: ["✅ CI", "🔒 CodeQL (weekly)"]
    types: completed
    branches: [main]

jobs:
  deploy:
    name: deploy-to-server
    runs-on: self-hosted
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read
      contents: read
    concurrency:
      group: knox-deploy
      cancel-in-progress: false
    steps:
      - name: Check that both CI and CodeQL succeeded for this commit
        uses: actions/github-script@v7
        id: check
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            const { data: workflows } = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const ciWorkflow = workflows.workflows.find(w => w.path === '.github/workflows/ci.yml');
            const codeqlWorkflow = workflows.workflows.find(w => w.path === '.github/workflows/codeql.yml');
            if (!ciWorkflow || !codeqlWorkflow) {
              core.setFailed('Could not find ci.yml or codeql.yml workflow');
              return;
            }
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: headSha,
              per_page: 50,
            });
            const ciSuccess = runs.workflow_runs.some(
              r => r.workflow_id === ciWorkflow.id && r.conclusion === 'success'
            );
            const codeqlSuccess = runs.workflow_runs.some(
              r => r.workflow_id === codeqlWorkflow.id && r.conclusion === 'success'
            );
            if (!ciSuccess || !codeqlSuccess) {
              core.info('Skipping deploy: waiting for both CI and CodeQL to succeed for this commit.');
              core.setOutput('ready', 'false');
              process.exit(0); // exit 0 so we don't fail the workflow, we just skip deploy
            }
            core.setOutput('ready', 'true');

      - name: Pull and deploy
        if: steps.check.outputs.ready == 'true'
        run: bash ~/Docker/KnoxStringing/repo/scripts/pull-deploy.sh
