# Weekly link check against production (catches broken external links over time).
# CI only checks links against localhost.
name: 🔗 Prod Link Checks (weekly)

on:
  schedule:
    - cron: "0 0 * * 1"  # Monday 00:00 UTC
  workflow_dispatch:

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lychee link check (production)
        run: bash scripts/lychee-check.sh https://knoxstringing.com --exclude 'cdn-cgi/l/email-protection'
