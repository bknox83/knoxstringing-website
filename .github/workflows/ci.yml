# CI: site-checks, codeql, prod-link-check, and deploy-to-server
# When each job runs:
#   push to main: site-checks, codeql, and deploy-to-server (runs after site-checks and codeql pass)
#   pull_request: site-checks and codeql
#   schedule (Mon 00:00 UTC): codeql and prod-link-check
name: ✅ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1"  # Monday 00:00 UTC

jobs:
  check:
    name: site-checks
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    env:
      NODE_OPTIONS: "--no-deprecation"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 20

      - name: Lint workflows
        uses: eifinger/actionlint-action@v1

      - name: HTML validation (W3C Nu)
        run: |
          docker run --rm -v "$PWD:/data" ghcr.io/validator/validator:latest vnu --skip-non-html /data/site/index.html

      - name: Verify referenced images exist
        run: node scripts/check-site-image-refs.js

      - name: JSON-LD LocalBusiness schema validation
        run: node scripts/validate-jsonld.js

      - name: Generate sitemap
        run: bash scripts/generate-sitemap.sh

      - name: Sitemap validation
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          try:
              t = ET.parse('site/sitemap.xml')
              r = t.getroot()
              ns = 'http://www.sitemaps.org/schemas/sitemap/0.9'
              locs = r.findall('.//{%s}loc' % ns)
              if not locs:
                  print('sitemap.xml: no <loc> entries')
                  exit(1)
              print('sitemap.xml: valid,', len(locs), 'URL(s)')
          except ET.ParseError as e:
              print('sitemap.xml: invalid XML', e)
              exit(1)
          "

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Lockfile check
        run: |
          npm install --package-lock-only
          git diff --exit-code package-lock.json || (echo "::error::package-lock.json is out of sync with package.json; run 'npm install' and commit the updated lockfile"; exit 1)

      - name: Install dependencies and build
        run: |
          npm ci 2>/dev/null || npm install
          npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Install serve and pa11y
        env:
          NPM_CONFIG_LOGLEVEL: error
        run: npm install -g serve pa11y wait-on @lhci/cli@0.15.x

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
        id: chrome

      - name: Start server and run link check, smoke test, and accessibility
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          CHROME_FLAGS: --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage --disable-gpu
        run: |
          serve site -l 3000 &
          SERVE_PID=$!
          npx wait-on http://localhost:3000 --timeout 15000

          # Lighthouse CI (server already up; no startServerCommand in lighthouserc.js)
          lhci autorun

          # Lychee link checker (version in scripts/lychee-check.sh)
          bash scripts/lychee-check.sh http://localhost:3000

          # Sitemap URLs: assert all return 200 when served locally
          sed -n 's|.*<loc>\([^<]*\)</loc>.*|\1|p' site/sitemap.xml | sed 's|https://www.knoxstringing.com|http://localhost:3000|g' | bash scripts/lychee-check.sh --stdin

          # Smoke test
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
          if [ "$code" != "200" ]; then echo "Expected 200, got $code"; exit 1; fi
          curl -sf http://localhost:3000 | grep -q "Knox Racquet Stringing" || (echo "Missing: Knox Racquet Stringing"; exit 1)
          curl -sf http://localhost:3000 | grep -q "Get in Touch" || (echo "Missing: Get in Touch"; exit 1)

          # Pa11y accessibility
          pa11y http://localhost:3000 --threshold 0 --config pa11y.json

          kill $SERVE_PID 2>/dev/null || true

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  prod-link-check:
    name: prod-link-check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lychee link check (production)
        run: bash scripts/lychee-check.sh https://www.knoxstringing.com --exclude 'cdn-cgi/l/email-protection'

  deploy-to-server:
    name: deploy-to-server
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check, codeql]
    concurrency:
      group: knox-deploy
      cancel-in-progress: false
    steps:
      - name: Pull and deploy
        run: bash ~/Docker/KnoxStringing/repo/scripts/pull-deploy.sh
