# CodeQL security analysis (JavaScript) - weekly only.
# On push/PR, CodeQL runs in the CI workflow so deploy can wait for it.
# This file exists so GitHub Code Scanning finds the config; only runs on schedule.
# https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors

name: 🔒 CodeQL (weekly)

on:
  schedule:
    - cron: "0 0 * * 1"  # Monday 00:00 UTC

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
