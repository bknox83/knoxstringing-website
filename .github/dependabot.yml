# Dependabot: open PRs when Docker base images (and GitHub Actions) get updates
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
